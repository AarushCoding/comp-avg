<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Cube Pro - Penalties</title>
    <style>
        :root {
            --orange: #ff8c00;
            --orange-glow: rgba(255, 140, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg: #0f172a;
            --red: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 2rem;
            width: 100%; max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        
        h2 { margin: 0; font-weight: 800; background: linear-gradient(to right, #fff, var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-reset {
            background: transparent; border: 1px solid var(--glass-border);
            color: #94a3b8; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;
        }
        .btn-reset:hover { border-color: var(--red); color: var(--red); }

        select, input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px; color: white; outline: none;
        }

        .solve-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .time-input { flex-grow: 1; font-family: monospace; }
        
        .penalty-btn {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05); color: #94a3b8; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.2s;
        }
        .penalty-btn.active-plus { border-color: var(--orange); color: var(--orange); background: rgba(255, 140, 0, 0.1); }
        .penalty-btn.active-dnf { border-color: var(--red); color: var(--red); background: rgba(239, 68, 68, 0.1); }

        .stats-panel {
            background: rgba(255, 140, 0, 0.1); border-radius: 16px; padding: 1.5rem;
            border: 1px solid rgba(255, 140, 0, 0.2); margin-top: 1.5rem;
        }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stat-value { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--orange); }

        .orb { position: absolute; width: 300px; height: 300px; background: var(--orange); filter: blur(120px); opacity: 0.1; z-index: -1; border-radius: 50%; }
    </style>
</head>
<body>

<div class="orb"></div>

<div class="glass-card">
    <div class="header-row">
        <h2>CUBE COMP</h2>
        <button class="btn-reset" onclick="clearSession()">RESET</button>
    </div>
    
    <div style="margin-bottom: 1.5rem;">
        <select id="format" onchange="initApp()" style="width: 100%;">
            <option value="ao5">Average of 5 (Ao5)</option>
            <option value="mo3">Mean of 3 (Mo3)</option>
        </select>
    </div>

    <div id="solveList"></div>

    <div class="stats-panel">
        <div class="stat-line">
            <span id="resLabel">Current Ao5</span>
            <span class="stat-value" id="curAvg">--</span>
        </div>
        <div class="stat-line">
            <span id="bestLabel">Best Possible</span>
            <span class="stat-value" id="bestAvg">--</span>
        </div>
    </div>
</div>

<script>
    const formatSelect = document.getElementById('format');
    const solveList = document.getElementById('solveList');
    
    // Load state
    let state = JSON.parse(localStorage.getItem('cubeState')) || {
        format: 'ao5',
        solves: Array(5).fill({ raw: '', plusTwo: false, dnf: false })
    };

    function save() {
        localStorage.setItem('cubeState', JSON.stringify(state));
        calculate();
    }

    function clearSession() {
        if(confirm("Clear all times?")) {
            state.solves = state.solves.map(() => ({ raw: '', plusTwo: false, dnf: false }));
            save();
            render();
        }
    }

    function initApp() {
        const type = formatSelect.value;
        state.format = type;
        const count = type === 'ao5' ? 5 : 3;
        // Adjust array size if format changed
        if (state.solves.length !== count) {
            state.solves = Array(count).fill(null).map(() => ({ raw: '', plusTwo: false, dnf: false }));
        }
        render();
    }

    function render() {
        formatSelect.value = state.format;
        solveList.innerHTML = '';
        state.solves.forEach((solve, i) => {
            const row = document.createElement('div');
            row.className = 'solve-row';
            row.innerHTML = `
                <input type="text" class="time-input" placeholder="Solve ${i+1}" value="${solve.raw}" oninput="updateRaw(${i}, this.value)">
                <button class="penalty-btn ${solve.plusTwo ? 'active-plus' : ''}" onclick="togglePlus(${i})">+2</button>
                <button class="penalty-btn ${solve.dnf ? 'active-dnf' : ''}" onclick="toggleDNF(${i})">DNF</button>
            `;
            solveList.appendChild(row);
        });
        calculate();
    }

    function updateRaw(i, val) { state.solves[i].raw = val; save(); }
    
    function togglePlus(i) { 
        state.solves[i].plusTwo = !state.solves[i].plusTwo; 
        if(state.solves[i].plusTwo) state.solves[i].dnf = false;
        render(); save(); 
    }

    function toggleDNF(i) { 
        state.solves[i].dnf = !state.solves[i].dnf; 
        if(state.solves[i].dnf) state.solves[i].plusTwo = false;
        render(); save(); 
    }

    function getFinalTime(solve) {
        if (solve.dnf) return Infinity;
        let t = parseFloat(solve.raw);
        if (isNaN(t)) return null;
        return solve.plusTwo ? t + 2 : t;
    }

    function calculate() {
        const finalTimes = state.solves.map(getFinalTime);
        const filled = finalTimes.filter(t => t !== null);
        const count = state.format === 'ao5' ? 5 : 3;

        document.getElementById('resLabel').innerText = state.format === 'ao5' ? "Current Ao5" : "Current Mo3";
        
        // Current Average
        if (filled.length === count) {
            document.getElementById('curAvg').innerText = runCalc(filled, state.format);
        } else {
            document.getElementById('curAvg').innerText = "Waiting...";
        }

        // Best Possible
        if (filled.length < count) {
            const bestCase = [...filled];
            while(bestCase.length < count) bestCase.push(0);
            document.getElementById('bestAvg').innerText = runCalc(bestCase, state.format);
        } else {
            document.getElementById('bestAvg').innerText = "Final";
        }
    }

    function runCalc(times, type) {
        const dnfs = times.filter(t => t === Infinity).length;
        if (type === 'mo3') {
            return dnfs > 0 ? "DNF" : (times.reduce((a,b)=>a+b,0)/3).toFixed(2);
        }
        if (dnfs >= 2) return "DNF";
        const sorted = [...times].sort((a,b) => a - b);
        sorted.shift(); sorted.pop(); // Remove min/max
        if (sorted.includes(Infinity)) return "DNF";
        return (sorted.reduce((a,b)=>a+b,0)/3).toFixed(2);
    }

    render();
</script>
</body>
</html>
