<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comp Avg</title>
    <style>
        :root {
            --green: #00ff88;
            --green-bright: #52ffab;
            --gold: #ffcc00;
            --glass-border: rgba(0, 255, 136, 0.2);
            --bg: #000a06;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #001a0f, var(--bg));
            color: #d0ffea;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .glass-card {
            background: rgba(0, 10, 5, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 2rem;
            width: 100%; max-width: 440px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        .trinity-header {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 2rem;
        }

        .header-item { display: flex; flex-direction: column; gap: 5px; }
        .header-label { font-size: 0.65rem; color: var(--green); text-transform: uppercase; }

        select, .wca-input {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 8px; color: white; padding: 8px; font-size: 0.8rem; outline: none;
        }

        .solve-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .input-container { position: relative; flex-grow: 1; }

        input.time-input {
            width: 100%; background: rgba(0, 255, 136, 0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px; color: white; font-family: 'Courier New', monospace; outline: none; font-size: 1rem; box-sizing: border-box;
        }

        .single-pr-symbol {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--green); color: black; font-size: 0.6rem; font-weight: 900;
            padding: 2px 4px; border-radius: 4px; display: none;
        }

        .stats {
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.1), rgba(0,0,0,0));
            border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--glass-border); margin-top: 1.5rem; position: relative;
            transition: 0.3s ease;
        }

        .avg-pr-badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--green); color: black; font-size: 0.65rem; font-weight: 900;
            padding: 2px 6px; border-radius: 4px; display: none;
        }

        /* Status Glows */
        .pr-glow { box-shadow: 0 0 35px rgba(0, 255, 136, 0.4); border-color: var(--green-bright); }
        .nr-glow { box-shadow: 0 0 45px rgba(255, 204, 0, 0.5); border-color: var(--gold); }
        .nr-glow .val { color: var(--gold) !important; }

        .stat-line { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .val { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; color: var(--green-bright); }
        .label { font-size: 0.85rem; color: #65b08d; }

        /* Action Buttons */
        .action-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .btn-action {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--green); padding: 10px 20px; border-radius: 12px; 
            cursor: pointer; font-size: 0.8rem; font-weight: bold; flex: 1;
        }
        .btn-action:hover { background: rgba(0, 255, 136, 0.1); }

        .btn-p { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: transparent; color: #4b8c6d; cursor: pointer; }
        .active-plus { border-color: var(--green); color: var(--green); }
        .active-dnf { border-color: #ff4444; color: #ff4444; }
        .strike input { color: #2e845c; text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="trinity-header">
        <div class="header-item">
            <span class="header-label">Format</span>
            <select id="format" onchange="changeFormat()">
                <option value="ao5">Ao5</option>
                <option value="mo3">Mo3</option>
            </select>
        </div>
        <div class="header-item">
            <span class="header-label">WCA ID</span>
            <input type="text" id="wcaId" class="wca-input" placeholder="2022NAIK01" oninput="fetchPR()">
        </div>
        <div class="header-item">
            <span class="header-label">Event</span>
            <select id="event" onchange="handleEventChange()">
                <optgroup label="NxN">
                    <option value="222">2x2x2 Cube</option>
                    <option value="333">3x3x3 Cube</option>
                    <option value="444">4x4x4 Cube</option>
                    <option value="555">5x5x5 Cube</option>
                    <option value="666">6x6x6 Cube</option>
                    <option value="777">7x7x7 Cube</option>
                </optgroup>
            
                <optgroup label="Sides">
                    <option value="333oh">3x3x3 One-Handed</option>
                    <option value="clock">Clock</option>
                    <option value="minx">Megaminx</option>
                    <option value="pyram">Pyraminx</option>
                    <option value="skewb">Skewb</option>
                    <option value="sq1">Square-1</option>
                </optgroup>
            
                <optgroup label="Blindfolded">
                    <option value="333bf">3x3x3 Blindfolded</option>
                    <option value="444bf">4x4x4 Blindfolded</option>
                    <option value="555bf">5x5x5 Blindfolded</option>
                </optgroup>
            
                <optgroup label="Challenges">
                    <option value="333fm">3x3x3 Fewest Moves</option>
                </optgroup>
            </select>
        </div>
    </div>

    <div id="solveList"></div>

    <div class="stats" id="statsCard">
        <div class="avg-pr-badge" id="avgPrBadge">AVG PR</div>
        <div class="stat-line"><span class="label">Result</span><span class="val" id="curAvg">--</span></div>
        <div class="stat-line"><span class="label">BPA</span><span class="val" id="bestAvg">--</span></div>
        <div class="stat-line"><span class="label">WPA</span><span class="val" id="worstAvg">--</span></div>
    </div>

    <div class="action-footer">
        <button class="btn-action" onclick="copyResult()">COPY</button>
        <button class="btn-action" style="border-color: rgba(255,68,68,0.3); color: #ff4444;" onclick="resetAll()">RESET</button>
    </div>
</div>

<script>
    // Current UK National Record Averages (Approx for 2026)
    const ukRecords = { "333": 5.80, "222": 1.20, "444": 22.50, "333oh": 9.50, "clock": 3.40, "pyram": 1.80 };
    
    let officialPR = { single: Infinity, average: Infinity };
    let state = { format: 'ao5', solves: [] };

    async function fetchPR() {
        const id = document.getElementById('wcaId').value.trim().toUpperCase();
        const ev = document.getElementById('event').value;
        if (id.length < 10) return;

        try {
            const res = await fetch(`https://www.worldcubeassociation.org/api/v0/persons/${id}`);
            const data = await res.json();
            const prs = data.personal_records;
            if (prs && prs[ev]) {
                officialPR.single = prs[ev].single.best / 100;
                officialPR.average = prs[ev].average ? prs[ev].average.best / 100 : Infinity;
                calculate();
            }
        } catch (e) { console.error("API error"); }
    }

    function syncArraySize() {
        const count = state.format === 'ao5' ? 5 : 3;
        if (state.solves.length !== count) {
            state.solves = Array.from({length: count}, () => ({ raw: '', plusTwo: false, dnf: false }));
        }
    }

    function buildUI() {
        syncArraySize();
        const list = document.getElementById('solveList');
        list.innerHTML = '';
        state.solves.forEach((solve, i) => {
            const div = document.createElement('div');
            div.className = `solve-row`;
            div.id = `row-${i}`;
            div.innerHTML = `
                <div class="input-container">
                    <input type="text" class="time-input" id="input-${i}" placeholder="Solve ${i+1}" value="${solve.raw}" oninput="updateTime(${i}, this.value)">
                    <div class="single-pr-symbol" id="pr-single-${i}">PR</div>
                </div>
                <button class="btn-p ${solve.plusTwo ? 'active-plus' : ''}" onclick="togglePlus(${i})">+2</button>
                <button class="btn-p ${solve.dnf ? 'active-dnf' : ''}" onclick="toggleDNF(${i})">DNF</button>
            `;
            list.appendChild(div);
        });
        calculate();
    }

    function updateTime(i, v) { state.solves[i].raw = v; calculate(); }
    function togglePlus(i) { state.solves[i].plusTwo = !state.solves[i].plusTwo; state.solves[i].dnf = false; buildUI(); }
    function toggleDNF(i) { state.solves[i].dnf = !state.solves[i].dnf; state.solves[i].plusTwo = false; buildUI(); }

    function calculate() {
        const times = state.solves.map(s => {
            if (s.dnf) return Infinity;
            if (!s.raw || s.raw.trim() === "") return null;
            let n = parseFloat(s.raw);
            return isNaN(n) ? null : (s.plusTwo ? n + 2 : n);
        });

        // Single PR Badges
        times.forEach((t, i) => {
            const badge = document.getElementById(`pr-single-${i}`);
            if (badge) badge.style.display = (t !== null && t < officialPR.single) ? 'block' : 'none';
        });

        const filled = times.filter(t => t !== null);
        const count = state.format === 'ao5' ? 5 : 3;
        const curAvg = (filled.length === count) ? runMath(filled) : null;
        
        document.getElementById('curAvg').innerText = curAvg ? curAvg.toFixed(2) : "--";

        // Logic for PR and NR glows
        const isAvgPR = (curAvg && curAvg < officialPR.average);
        const isNR = (curAvg && curAvg < (ukRecords[document.getElementById('event').value] || 0));
        
        const card = document.getElementById('statsCard');
        const badge = document.getElementById('avgPrBadge');

        badge.style.display = isAvgPR ? 'block' : 'none';
        badge.innerText = isNR ? "UK RECORD" : "AVG PR";
        
        card.className = "stats";
        if (isNR) card.classList.add('nr-glow');
        else if (isAvgPR) card.classList.add('pr-glow');

        updateBPA(filled, count);
        handleStrikes(times, filled);
    }

    function updateBPA(filled, count) {
        if (filled.length < count) {
            let bpaArr = [...filled]; while(bpaArr.length < count) bpaArr.push(0);
            document.getElementById('bestAvg').innerText = runMath(bpaArr).toFixed(2);
        } else {
            document.getElementById('bestAvg').innerText = "Final";
        }
    }

    function handleStrikes(times, filled) {
        state.solves.forEach((_, i) => document.getElementById(`row-${i}`).classList.remove('strike'));
        if (state.format === 'ao5' && filled.length === 5) {
            const indexed = times.map((v, i) => ({v, i})).sort((a,b) => a.v - b.v);
            document.getElementById(`row-${indexed[0].i}`).classList.add('strike');
            document.getElementById(`row-${indexed[4].i}`).classList.add('strike');
        }
    }

    function runMath(t) {
        let s = [...t].sort((a,b) => a - b);
        if (state.format === 'ao5') { s.shift(); s.pop(); }
        return s.reduce((a,b) => a+b, 0) / s.length;
    }

    function resetAll() { if(confirm("Clear times?")) { state.solves = []; buildUI(); } }
    function copyResult() { 
        const res = document.getElementById('curAvg').innerText;
        navigator.clipboard.writeText(`Result: ${res}`).then(() => alert("Copied!"));
    }
    function changeFormat() { state.format = document.getElementById('format').value; state.solves = []; buildUI(); }

    buildUI();
</script>
</body>
</html>
