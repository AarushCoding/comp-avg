<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Cube Pro</title>
    <style>
        :root {
            --orange: #ff8c00;
            --orange-bright: #ffae42;
            --glass: rgba(255, 140, 0, 0.05);
            --glass-border: rgba(255, 140, 0, 0.2);
            --bg: #0a0600;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a0f00, var(--bg));
            color: #ffead0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .glass-card {
            background: rgba(15, 10, 0, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 2rem;
            width: 100%; max-width: 400px;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.15);
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h2 { margin: 0; font-size: 1.1rem; letter-spacing: 3px; color: var(--orange); text-transform: uppercase; }

        .btn-reset {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--orange); padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; transition: 0.3s;
        }
        .btn-reset:hover { background: rgba(255, 140, 0, 0.1); border-color: var(--orange-bright); }

        .solve-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        
        input {
            flex-grow: 1; background: rgba(255, 140, 0, 0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px; color: white; font-family: 'Courier New', monospace; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(255, 140, 0, 0.2); }

        .btn-p {
            padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(255, 140, 0, 0.02); color: #845c2e; cursor: pointer; font-weight: bold; font-size: 0.7rem; transition: 0.2s;
        }
        .btn-p.active-plus { border-color: var(--orange); color: var(--orange); background: rgba(255, 140, 0, 0.15); }
        .btn-p.active-dnf { border-color: #ff4444; color: #ff4444; background: rgba(255, 68, 68, 0.1); }

        .stats {
            background: linear-gradient(145deg, rgba(255, 140, 0, 0.1), rgba(0,0,0,0));
            border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--glass-border); margin-top: 1.5rem;
        }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .val { font-family: 'Courier New', monospace; font-size: 1.4rem; font-weight: bold; color: var(--orange-bright); }
        .label { font-size: 0.85rem; color: #b08d65; }

        .goal-box {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);
            font-size: 0.8rem; color: #d4a773; text-align: center; font-style: italic;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header-row">
        <h2>Comp Calc</h2>
        <select id="format" onchange="changeFormat()" style="background:none; color:var(--orange); border:none; outline:none; cursor:pointer; font-weight: bold; font-size: 0.9rem;">
            <option value="ao5">Ao5</option>
            <option value="mo3">Mo3</option>
        </select>
        <button class="btn-reset" onclick="resetAll()">RESET</button>
    </div>

    <div id="solveList"></div>

    <div class="stats">
        <div class="stat-line">
            <span class="label" id="labelRes">Current Result</span>
            <span class="val" id="curAvg">--</span>
        </div>
        <div class="stat-line">
            <span class="label" id="labelBest">Best Possible</span>
            <span class="val" id="bestAvg">--</span>
        </div>
        <div id="goalBox" class="goal-box">Enter times to see requirements</div>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('cube_orange_v4')) || {
        format: 'ao5',
        solves: []
    };

    function syncArraySize() {
        const count = state.format === 'ao5' ? 5 : 3;
        if (state.solves.length !== count) {
            state.solves = Array.from({length: count}, () => ({ raw: '', plusTwo: false, dnf: false }));
        }
    }

    function render() {
        syncArraySize();
        const list = document.getElementById('solveList');
        list.innerHTML = '';
        
        state.solves.forEach((solve, i) => {
            const div = document.createElement('div');
            div.className = 'solve-row';
            div.innerHTML = `
                <input type="text" placeholder="Time ${i+1}" value="${solve.raw}" oninput="updateTime(${i}, this.value)">
                <button class="btn-p ${solve.plusTwo ? 'active-plus' : ''}" onclick="togglePlus(${i})">+2</button>
                <button class="btn-p ${solve.dnf ? 'active-dnf' : ''}" onclick="toggleDNF(${i})">DNF</button>
            `;
            list.appendChild(div);
        });

        document.getElementById('format').value = state.format;
        calculate();
        localStorage.setItem('cube_orange_v4', JSON.stringify(state));
    }

    function updateTime(i, val) { 
        state.solves[i].raw = val; 
        calculate(); 
        localStorage.setItem('cube_orange_v4', JSON.stringify(state)); 
    }

    function togglePlus(i) { 
        state.solves[i].plusTwo = !state.solves[i].plusTwo; 
        if(state.solves[i].plusTwo) state.solves[i].dnf = false; 
        render(); 
    }

    function toggleDNF(i) { 
        state.solves[i].dnf = !state.solves[i].dnf; 
        if(state.solves[i].dnf) state.solves[i].plusTwo = false; 
        render(); 
    }
    
    function changeFormat() {
        state.format = document.getElementById('format').value;
        state.solves = [];
        render();
    }

    function resetAll() {
        if(confirm("Reset all times?")) {
            state.solves = state.solves.map(() => ({ raw: '', plusTwo: false, dnf: false }));
            render();
        }
    }

    function getVal(solve) {
        if (solve.dnf) return Infinity;
        let n = parseFloat(solve.raw);
        if (isNaN(n)) return null;
        return solve.plusTwo ? n + 2 : n;
    }

    function calculate() {
        const times = state.solves.map(getVal);
        const filled = times.filter(t => t !== null);
        const count = state.format === 'ao5' ? 5 : 3;

        // Current Avg
        document.getElementById('curAvg').innerText = (filled.length === count) ? runMath(filled) : "--";

        // Best Possible
        if (filled.length < count) {
            let best = [...filled];
            while(best.length < count) best.push(0);
            document.getElementById('bestAvg').innerText = runMath(best);
            updateGoal(filled, count);
        } else {
            document.getElementById('bestAvg').innerText = "Final";
            document.getElementById('goalBox').innerText = "Round Complete";
        }
    }

    function updateGoal(filled, count) {
        const goalBox = document.getElementById('goalBox');
        if (state.format === 'ao5' && filled.length === 4) {
            // Logic for "What do I need for a Sub-X?"
            // We find the current 3 counting times if the next solve is 0.00
            const sorted = [...filled, 0].sort((a,b) => a-b);
            sorted.shift(); // Remove best (the 0)
            sorted.pop();   // Remove worst
            const currentSum = sorted.reduce((a,b)=>a+b,0);
            const target = Math.ceil(runMath([...filled, 0])) + 1; // Example target
            goalBox.innerText = `You have 4 times. Finish strong!`;
        } else {
            goalBox.innerText = `Keep entering times...`;
        }
    }

    function runMath(t) {
        const dnfs = t.filter(x => x === Infinity).length;
        if (state.format === 'mo3') {
            return dnfs > 0 ? "DNF" : (t.reduce((a,b)=>a+b,0)/3).toFixed(2);
        }
        if (dnfs >= 2) return "DNF";
        let s = [...t].sort((a,b)=>a-b);
        s.shift(); s.pop();
        return s.includes(Infinity) ? "DNF" : (s.reduce((a,b)=>a+b,0)/3).toFixed(2);
    }

    render();
</script>
</body>
</html>
